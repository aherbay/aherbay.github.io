<style>
  .custom-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    padding: 20px 0;
  }
  .custom-grid-item {
    width: 400px;
    height: 300px;
    overflow: hidden; /* Fixes the console warning */
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .custom-grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* This is your 400px crop */
    display: block;
    overflow: clip; /* Modern browser fix */
  }
</style>

<div class="custom-grid">
  {{ $album := .Get "album" }}
  {{ $path := printf "media/albums/%s/*" $album }}
  {{ range (resources.Match $path) }}
    <div class="custom-grid-item">
      <a href="{{ .RelPermalink }}" data-fancybox="gallery">
        <img src="{{ .RelPermalink }}" alt="{{ .Name }}">
      </a>
    </div>
  {{ end }}
</div>
